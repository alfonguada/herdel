<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionaempresa</title>
    <link rel="icon" href="{{ url_for('static', filename='icono.png') }}" type="image/png">
<script src="https://kit.fontawesome.com/3da862d4a6.js" crossorigin="anonymous"></script>
    <style>
    html {
    font-family: 'open sans', sans-serif;
}
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
        }

        h3 {
            color: #333;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button, a {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button {
            background-color: #ff4646; /* Color rojo */
            color: #fff; /* Texto en color blanco */
            border: none;
            margin-right: 10px;
        }

        a {
            background-color: #ddd; /* Color gris claro */
            color: #333; /* Texto en color gris oscuro */
        }

        button:hover, a:hover {
            background-color: #333; /* Color gris oscuro */
            color: #fff; /* Texto en color blanco */
        }
    </style>
</head>
<body>
    <h3>Confirmar Eliminación</h3>
    <p>Esta acción no es reversible. ¿Estás seguro de eliminar la solicitud?</p>
    <form method="POST" action="{{ url_for('delete_request', request_id=request.id) }}">
        <button type="submit">Sí</button>
    </form>
    <a href="{{ url_for('admin_requests') }}">No</a>
</body>
</html>

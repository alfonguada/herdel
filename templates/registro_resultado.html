<!-- templates/registro_resultado.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro {{ tipo|capitalize }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            padding: 2rem;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            margin-top:-50%;
        }
        .card h2 {
            margin-bottom: 1rem;
            color: #4CAF50;
        }
        .card p {
            margin: 0.5rem 0;
            font-size: 1.1rem;
        }
        .duracion {
            margin-top: 1rem;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>{{ 'Entrada' if tipo == 'entrada' else 'Salida' }} registrada</h2>
        <p><strong>Empleado:</strong> {{ usuario.nombre }}</p>
        <p><strong>Centro:</strong> {{ centro.nombre }}</p>

        {% if tipo == 'salida' and duracion %}
        <p class="duracion"><strong>Duración:</strong> {{ duracion }}</p>
        {% endif %}
    </div>
</body>
</html>

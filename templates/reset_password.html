<!-- templates/reset_password.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionaempresa</title>
    <link rel="icon" href="{{ url_for('static', filename='icono.png') }}" type="image/png">
    <style>
    html {
    font-family: 'open sans', sans-serif;
}
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        label {
            font-size: 18px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            background-color: #4caf50;
            color: #fff;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        input[type="submit"]:active {
            background-color: #4caf50;
        }
    </style>
</head>
<body>
    <form method="POST" action="{{ url_for('reset_password') }}">
        {{ form.hidden_tag() }}
        <h2>Cambiar Contraseña</h2>
	<label for="{{ form.email.id }}">Correo Electrónico:</label>
        {{ form.email }}
        <label for="{{ form.new_password.id }}">Nueva Contraseña:</label>
        {{ form.new_password }}
        <label for="{{ form.confirm_password.id }}">Confirmar Contraseña:</label>
        {{ form.confirm_password }}
        <input type="submit" value="Cambiar Contraseña">
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error de acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            padding: 2rem;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            margin-top: -50%;
        }
        .card h2 {
            margin-bottom: 1rem;
            color: #E53935;
        }
        .card p {
            margin: 0.5rem 0;
            font-size: 1.1rem;
            color: #333;
        }
        .ip {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>❌ Acceso Denegado</h2>
        <p>{{ mensaje }}</p>
        {% if ip %}
            <p class="ip">Tu IP: {{ ip }}</p>
        {% endif %}
        <p>Si crees que esto es un error, contacta con el administrador.</p>
    </div>
</body>
</html>

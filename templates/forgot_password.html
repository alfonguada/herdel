<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Gestionaempresa</title>
    <link rel="icon" href="{{ url_for('static', filename='logo_empresa.png') }}" type="image/png">
    <style>
    html {
    font-family: 'open sans', sans-serif;
}
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-size: 18px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            background-color: #4C94E0;
            color: #fff;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        a {
            padding: 10px 20px;
            font-size: 16px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            background-color: #28a745;
            border: 1px solid #28a745;
            border-radius: 5px;
            cursor: pointer;
        }

        a:hover {
            background-color: #218838;
        }

        /* Estilo para hacer más grande el icono de la llave */
        .key-icon {
            font-size: 3rem; /* Aumenta el tamaño del icono */
            display: block; /* Hace que el icono esté encima del texto */
            margin-bottom: 10px; /* Espacio entre el icono y el texto */
            text-align: center; /* Centra el icono */
        }
                .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            object-fit: cover;
            z-index: -1;
filter: blur(0px);
        }
    </style>
 <!-- Incluye Font Awesome para los iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<!-- Importar la fuente Roboto -->
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Roboto', sans-serif;
    }
</style>

<body>
<video class="video-bg" autoplay muted loop style="max-height:100%;">
    <source src="{{ url_for('static', filename='fondo_login4.mp4') }}" type="video/mp4">
    Tu navegador no soporta la etiqueta de video.
</video>

<div style="background-color: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 12px; max-width: 400px; margin: auto; margin-top: 80px; text-align: center;">
    <form method="POST" action="{{ url_for('forgot_password') }}">
        {{ form.hidden_tag() }}

        <!-- Título con icono -->
        <h3><i class="fas fa-key"></i> Recuperar contraseña</h3>

        <!-- Campo de correo con icono -->
        <label for="{{ form.email.id }}" style="font-weight: bold; font-size: 0.9rem;">
            <i class="fas fa-envelope"></i> Correo electrónico:
        </label>
        {{ form.email }}

        <!-- Botón de recuperar -->
        <input type="submit" value="Recuperar contraseña" style="background-color: #1565A8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; font-weight: bold;">

        <!-- Botón de volver al login -->
        <a href="{{ url_for('login') }}" style="display: inline-block; background-color: #45A049; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-size: 16px; font-weight: bold; margin-top: 10px;">
            <i class="fas fa-undo"></i> Volver al inicio
        </a>
    </form>
</div>

</body>

</html>

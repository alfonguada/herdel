<script>
    $(document).ready(function() {
        $(".login-form").submit(function(e) {
            e.preventDefault(); // Evitar que el formulario se envíe de forma tradicional

            // Realizar solicitud AJAX al servidor
            $.ajax({
                type: "POST",
                url: "{{ url_for('login') }}",
                data: $(this).serialize(),
                success: function(response) {
                    if (response.status === "success") {
                        window.location.href = response.redirect_url; // Reemplaza con la URL correcta
                    } else if (response.status === "2fa_required") {
                        // Si 2FA es requerido, mostrar el campo de código 2FA
                        $("#otp-field").show();
                    } else {
                        $(".error-message").text(response.message).css("color", "red");
                    }
                },
                error: function(error) {
                    console.error("Error en la solicitud AJAX", error);
                }
            });
        });

        // Manejo de la solicitud para reenviar el QR de 2FA
        $("#resend-qr").click(function(e) {
            e.preventDefault();
            // Confirmar si el usuario está seguro de reenviar el código QR
            if (confirm("¿Estás seguro de que deseas recibir el código QR nuevamente por correo?")) {
                let email = $("input[name='email']").val(); // Obtener el correo directamente del formulario
                fetch('/resend_2fa_qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert("Te hemos enviado el QR por correo.");
                    } else {
                        alert("Hubo un error al enviar el QR. Inténtalo nuevamente.");
                    }
                })
                .catch(error => {
                    alert("Hubo un error al enviar el QR.");
                    console.error(error);
                });
            } else {
                console.log("El usuario canceló el reenvío del QR.");
            }
        });
    });
</script>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault(); // Prevenir envío inicial
        const form = e.target;
        const formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData,
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "2fa_required") {
                // Mostrar el campo para el código 2FA
                document.getElementById('otp-field').style.display = 'block';
            } else if (data.status === "success") {
                window.location.href = data.redirect_url;
            } else {
                // Mostrar mensaje de error
                alert(data.message);
            }
        })
        .catch(err => console.error("Error:", err));
    });
</script>

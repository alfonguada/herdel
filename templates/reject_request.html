<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionaempresa</title>
    <link rel="icon" href="{{ url_for('static', filename='icono.png') }}" type="image/png">
<script src="https://kit.fontawesome.com/3da862d4a6.js" crossorigin="anonymous"></script>
    <style>
    html {
    font-family: 'open sans', sans-serif;
}
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            max-width: 400px;
            margin: 20px;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        p {
            color: #333;
            margin-bottom: 10px;
        }

        textarea {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
        }

        input[type="submit"] {
            background-color: #ff4646;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="submit"]:hover {
            background-color: #e53935;
        }

        a {
            display: block;
            color: #3498db;
            text-decoration: none;
            margin-top: 15px;
            justify-content: center;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>Denegar Solicitud</h2>
    <form method="POST" action="{{ url_for('reject_request', request_id=request.id) }}">
        <p>Estás seguro de denegar la petición de {{ request.user_name }}?</p>
        <p>Motivo de la denegación:</p>
        <textarea name="rejection_reason" required></textarea><br>
        <input type="submit" value="DENEGAR">
    </form>
    <a href="{{ url_for('admin_requests') }}">Volver</a>
</body>
</html>
